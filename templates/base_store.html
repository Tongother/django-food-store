<!DOCTYPE html>
{% load tailwind_cli %}
<html lang="es">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %} django food store {% endblock %}</title>
    {% tailwind_css %}
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
    <style>
      body { font-family: 'DM Sans', sans-serif; background: #fafaf9; }
      h1, h2 { font-family: 'DM Serif Display', serif; }
    </style>
    {% block extra_css %}{% endblock %}
  </head>
  <body class="min-h-screen">

    {% include 'components/navbar_store.html' %}

    {% block content %}{% endblock %}

    {% block extra_modals %}{% endblock %}

    {% block extra_js %}{% endblock %}

  </body>
</html>

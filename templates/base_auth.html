<!DOCTYPE html>
{% load tailwind_cli %}
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %}Authentication - django food store{% endblock %}</title>
    {% tailwind_css %}
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
    <style>
      body { font-family: 'DM Sans', sans-serif; }
      h1, h2 { font-family: 'DM Serif Display', serif; }
    </style>
    {% block extra_css %}{% endblock %}
  </head>
  <body class="min-h-screen bg-stone-50 flex">

    {% block auth_sidebar %}
      {% include 'components/auth_sidebar.html' %}
    {% endblock %}

    <div class="w-full lg:w-1/2 flex items-center justify-center px-3 py-5">
      <div class="w-full max-w-md">
        {% block content %}{% endblock %}
      </div>
    </div>

  </body>
</html>

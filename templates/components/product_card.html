<article class="product-card bg-white rounded-2xl overflow-hidden border border-stone-100 shadow-sm flex flex-col">
  <div class="h-48 bg-stone-100 overflow-hidden flex items-center justify-center">
    {% if product.image_url %}
      <img src="{{ product.image_url }}" alt="{{ product.name }}"
           class="w-full h-full object-cover"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"/>
      <div class="hidden w-full h-full items-center justify-center text-stone-300">
        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01"/>
        </svg>
      </div>
    {% else %}
      <div class="w-full h-full flex items-center justify-center text-stone-300">
        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01"/>
        </svg>
      </div>
    {% endif %}
  </div>

  <div class="p-5 flex flex-col flex-1">
    <h3 class="text-stone-900 text-lg mb-1 line-clamp-1">{{ product.name }}</h3>
    {% if product.description %}
      <p class="text-stone-500 text-sm leading-relaxed mb-4 line-clamp-2">{{ product.description }}</p>
    {% else %}
      <p class="text-stone-300 text-sm italic mb-4">No description</p>
    {% endif %}

    <div class="mt-auto flex items-center justify-between">
      <span class="text-amber-500 font-bold text-xl">${{ product.price }}</span>
      <button
        onclick="openModal('{{ product.id }}', '{{ product.name|escapejs }}', '{{ product.price }}')"
        class="flex items-center gap-2 bg-stone-900 hover:bg-amber-500 text-white text-xs font-semibold px-3 py-2 rounded-xl transition"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
        </svg>
        Add
      </button>
    </div>
  </div>
</article>

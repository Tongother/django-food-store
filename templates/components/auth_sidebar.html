<div class="hidden lg:flex lg:w-1/2 bg-stone-900 flex-col justify-between p-14 relative overflow-hidden">
  <div class="absolute inset-0 opacity-10"
    style="background-image: radial-gradient(circle at 20% 50%, #f59e0b 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, #d97706 0%, transparent 40%);">
  </div>
  
  <div class="relative z-10">
    <span class="text-amber-400 text-2xl font-bold tracking-widest uppercase">django food store</span>
  </div>
  
  <div class="relative z-10">
    <h1 class="text-white text-5xl leading-tight mb-4">
      {{ headline|safe|default:"Your store,<br/>your space." }}
    </h1>
    <p class="text-stone-400 text-lg">
      {{ subtitle|default:"Log in to manage your orders." }}
    </p>
  </div>
  
  <p class="relative z-10 text-stone-600 text-sm">django food store</p>
</div>

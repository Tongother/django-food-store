<li class="flex items-center gap-4 px-6 py-4">
  <div class="w-14 h-14 rounded-xl bg-stone-100 shrink-0 overflow-hidden flex items-center justify-center">
    {% if item.product.image_url %}
      <img src="{{ item.product.image_url }}" alt="{{ item.product.name }}"
           class="w-full h-full object-cover"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"/>
      <div class="hidden w-full h-full items-center justify-center text-stone-300">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01"/>
        </svg>
      </div>
    {% else %}
      <div class="w-full h-full flex items-center justify-center text-stone-300">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01"/>
        </svg>
      </div>
    {% endif %}
  </div>

  <div class="flex-1 min-w-0">
    <p class="text-stone-800 font-medium truncate">{{ item.product.name }}</p>
    <p class="text-stone-400 text-sm">${{ item.product.price }} x {{ item.quantity }}</p>
  </div>

  <p class="text-amber-500 font-bold shrink-0">${{ item.subtotal }}</p>
</li>
